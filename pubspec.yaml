name: gua_pos
description: GUA Fashion Store POS Management App
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # UI / iOS-inspired
  cupertino_icons: ^1.0.6

  # Charts (báo cáo)
  fl_chart: ^0.67.0

  # Barcode scanner (POS)
  mobile_scanner: ^5.1.0

  # In hóa đơn bluetooth
  flutter_bluetooth_printer: any

  # Hình ảnh
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Notifications
  flutter_local_notifications: ^17.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0